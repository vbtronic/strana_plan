<div class="page-header">
    <h1>Kontakt</h1>
    <p>Spojte se s námi</p>
    <div class="wave">
        <svg viewBox="0 0 1440 120" preserveAspectRatio="none">
            <path d="M0,60 C360,120 1080,0 1440,60 L1440,120 L0,120 Z" fill="#ffffff"/>
        </svg>
    </div>
</div>

<div class="page-content">
    <div class="program-block">
        <h2>Kontaktní údaje</h2>
        <div class="kontakt-info">
            <!-- ZMĚNIT EMAIL: nahraďte adresu níže vaším novým emailem -->
            <p>E-mail: <a href="mailto:stranaplan@gmail.com">stranaplan@gmail.com</a></p>
        </div>
    </div>

    <div class="program-block">
        <h2>Napište nám</h2>
        <!-- ZMĚNIT EMAIL: nahraďte adresu v action vaším novým emailem -->
        <form action="https://formsubmit.co/stranaplan@gmail.com" method="POST" class="contact-form">
            <input type="hidden" name="_subject" value="Nová zpráva z webu PLÁN">
            <input type="hidden" name="_captcha" value="true">
            <input type="hidden" name="_next" value="https://vbtronic.github.io/strana_plan/kontakt.html">
            <div class="form-group">
                <label for="name">Jméno</label>
                <input type="text" id="name" name="name" required>
            </div>
            <div class="form-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="form-group">
                <label for="message">Zpráva</label>
                <textarea id="message" name="message" rows="5" required></textarea>
            </div>
            <div class="form-checkbox">
                <input type="checkbox" id="consent" name="consent" required>
                <label for="consent">Souhlasím se <a href="ochrana-udaju.html" target="_blank">zpracováním osobních údajů</a></label>
            </div>
            <button type="submit" class="btn">Odeslat zprávu</button>
        </form>
    </div>
</div>
